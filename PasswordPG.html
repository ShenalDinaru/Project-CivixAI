<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CivixAI | Set Password</title>
    <link rel="stylesheet" href="LandingPG_Styles.css" />
    <link rel="stylesheet" href="LoginPG_Styles.css" />
</head>
<body>
    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="Resources/Background/sigiriya.jpg">
            <source src="Resources/Background/SL Edited.mp4" type="video/mp4" />
        </video>
        <div class="overlay"></div>

        <div class="ui-card" id="passwordCard" style="opacity: 0; transform: translateY(25px);">
            <div class="back-nav" id="backBtn">
                <img src="Resources/Icons/Back Button Icon.svg" alt="Back" class="back-icon">
            </div>

            <div class="brand-container login-logo">
                <img src="Resources/Background/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <h2 class="form-title">Set A Strong Password</h2>

            <form id="passwordForm" class="auth-form">
                <div class="password-container"> 
                    <div class="input-group-wrapper">
                        <input type="password" id="pass" placeholder="Set a Password*" required>
                    </div>
                    <span class="toggle-password" data-target="pass">👁️</span>
                </div>

                <div class="password-container">
                    <div class="input-group-wrapper">
                        <input type="password" id="confirm" placeholder="Confirm the Password*" required>
                    </div>
                    <span class="toggle-password" data-target="confirm">👁️</span>
                </div>

                <div class="strength-meter-wrapper">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>

                <div class="pass-req-box">
                    <p>Passwords must contain all of these:</p>
                    <ul>
                        <li id="len">8-20 characters</li>
                        <li id="upper">1 uppercase letter</li>
                        <li id="lower">1 lowercase letter</li>
                        <li id="spec">1 number or special character</li>
                    </ul>
                </div>

                <button type="submit" class="btn chat-btn" id="submitBtn" disabled style="opacity: 0.5; cursor: not-allowed;">
                    SIGN UP
                </button>
            </form>
        </div>
    </div>
    <script src="PasswordPG_Script.js"></script>
</body>
</html>
