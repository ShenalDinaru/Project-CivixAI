<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CivixAI | Set Password</title>
    <link rel="stylesheet" href="LandingPG_Styles.css" />
    <link rel="stylesheet" href="LoginPG_Styles.css" />
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="Resources/Background/sigiriya.jpg">
            <source src="Resources/Background/SL Edited.mp4" type="video/mp4" />
        </video>

        <div class="overlay"></div>

        <div class="ui-card" id="passwordCard">
            <div class="back-nav" id="backBtn">
                <img src="Resources/Icons/Back Button Icon.svg" alt="Back" class="back-icon">
            </div>

            <div class="brand-container login-logo">
                <img src="Resources/Background/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <h2 class="form-title">Secure Your Account</h2>

            <form id="passwordForm" class="auth-form">
                <div class="input-group-wrapper password-container">
                    <input type="password" id="password" placeholder="Create a Password*" required>
                    <img src="Resources/Icons/Password View Eye Icon.svg" class="toggle-password" alt="Toggle View">
                </div>

                <div class="input-group-wrapper password-container">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password*" required>
                    <img src="Resources/Icons/Password View Eye Icon.svg" class="toggle-password" alt="Toggle View">
                </div>

                <div style="font-size: 12px; color: #aaa; margin-bottom: 20px;">
                    Password must be at least 8 characters with uppercase, lowercase, and a number.
                </div>

                <button type="submit" class="btn chat-btn" id="signupBtn">COMPLETE SIGNUP</button>
            </form>

            <div class="auth-footer">
                <p>Already a Civica? <span class="reg-link" id="loginLink">Login Now</span></p>
            </div>
        </div>
    </div>

    <script src="PasswordSetup_Script.js"></script>
</body>
</html>
