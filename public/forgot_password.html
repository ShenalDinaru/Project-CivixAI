<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Forgot Password | CivixAI</title>
    <link rel="stylesheet" href="LandingPG_Styles.css" />
    <link rel="stylesheet" href="LoginPG_Styles.css" />
    <link rel="stylesheet" href="ForgotPassword_Styles.css" />
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="Resources/Background/sigiriya.jpg">
            <source src="Resources/Background/SL Edited.mp4" type="video/mp4" />
        </video>

        <div class="overlay"></div>

        <div class="ui-card" id="forgotPasswordCard">
            <div class="back-nav" id="backBtn">
                <img src="Resources/Icons/Back Button Icon.svg" alt="Back" class="back-icon">
            </div>

            <div class="brand-container login-logo">
                <img src="Resources/Background/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <h2 class="form-title">Forgot Password?</h2>

            <p style="color: #aaa; font-size: 14px; margin-bottom: 20px; text-align: center;">
                Enter your email address and we'll send you a link to reset your password.
            </p>

            <div class="success-message" id="successMessage">
                 Check your email for a password reset link. It will expire in 1 hour.
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="forgotPasswordForm" class="auth-form">
                <div class="input-group-wrapper">
                    <input type="email" id="email" placeholder="Enter your Email*" required>
                </div>

                <button type="submit" class="btn chat-btn" id="submitBtn">SEND RESET LINK</button>
            </form>

            <div id="resendSection" style="display: none; text-align: center;">
                <button type="button" class="btn chat-btn" id="resendBtn">REQUEST NEW LINK</button>
            </div>

            <div class="auth-footer">
                <p>Remember your password? <span class="reg-link" id="loginLink">Login Now</span></p>
            </div>
        </div>
    </div>

    <script src="ForgotPassword_Script.js"></script>
</body>
</html>
