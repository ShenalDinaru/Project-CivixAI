<!-- Landing page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivixAI | Home</title>

    <link rel="stylesheet" href="LandingPG_Styles.css" />
    <style>
        /* Loading Animation Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.3s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-container {
            text-align: center;
            position: relative;
        }

        /* Spinner Animation */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Pulsing Circle */
        .pulse-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto 30px;
            animation: pulse 2s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        .pulse-circle img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        /* Loading Text */
        .loading-text {
            color: white;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .dots {
            display: inline-block;
            width: 8px;
            text-align: left;
            animation: dots 1.4s infinite;
        }

        .dots:after {
            content: ".";
            animation: dots-animate 1.4s infinite;
        }

        @keyframes dots {
            0%, 20% {
                color: rgba(255, 255, 255, 0);
                text-shadow: .25em 0 0 rgba(255, 255, 255, 0), .5em 0 0 rgba(255, 255, 255, 0);
            }
            40% {
                color: white;
                text-shadow: .25em 0 0 rgba(255, 255, 255, 0), .5em 0 0 rgba(255, 255, 255, 0);
            }
            60% {
                text-shadow: .25em 0 0 white, .5em 0 0 rgba(255, 255, 255, 0);
            }
            80%, 100% {
                text-shadow: .25em 0 0 white, .5em 0 0 white;
            }
        }

        /* Progress Bar */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 30px auto;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: white;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-top: 8px;
            font-weight: 300;
        }

        .loading-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: 15px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-container">
            <div class="pulse-circle">
                <img src="../Resources/Icons/Silhouette/Lotus Tower.png" alt="Loading">
            </div>
            <div class="loading-text">
                Loading<span class="dots"></span>
            </div>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
            <div class="progress-text">
                <span id="progress-percent">0</span>% Loading
            </div>
            <div class="loading-subtitle">
                Preparing your experience
            </div>
        </div>
    </div>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="../Resources/Background/sigiriya.jpg">
            <source src="../Resources/Background/SL Edited.mp4" type="video/mp4" />
        </video>

        <div class="overlay"></div>

        <div class="ui-card" id="mainCard">
            <div class="brand-container">
                <img src="../Resources/Background/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <div class="bot-icon">
                <img src="../Resources/Animations/Login Gif Edited3.mov" alt="CivixAI Assistant">
            </div>

            <div class="auth-buttons">
                <button class="btn primary" id="loginBtn">Login</button>
                <button class="btn primary" id="signupBtn">Sign Up</button>
            </div>

            <div class="chat-box">
                <div class="chat-header">
                    Start Conversation
                </div>
                <button class="btn chat-btn" id="askNowBtn">Ask now</button>
            </div>

        </div>
    </div>

    <script src="LandingPG_Script.js"></script>
</body>
</html>
