<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivixAI - Loading</title>
    <!-- Favicons for dark and light mode -->
    <link rel="icon" type="image/png" href="/Resources/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/Resources/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/Resources/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Resources/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CivixAI" />
    <link rel="manifest" href="/Resources/favicons/site.webmanifest" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            position: relative;
        }

        /* Spinner Animation */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Pulsing Circle */
        .pulse-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 auto 30px;
            animation: pulse 2s ease-in-out infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        .pulse-circle .spinner {
            margin: 0;
            width: 40px;
            height: 40px;
            border-width: 3px;
        }

        .pulse-circle img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        /* Loading Text */
        .loading-text {
            color: white;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .dots {
            display: inline-block;
            width: 8px;
            text-align: left;
            animation: dots 1.4s infinite;
        }

        .dots:after {
            content: ".";
            animation: dots-animate 1.4s infinite;
        }

        @keyframes dots {
            0%, 20% {
                color: rgba(255, 255, 255, 0);
                text-shadow: .25em 0 0 rgba(255, 255, 255, 0), .5em 0 0 rgba(255, 255, 255, 0);
            }
            40% {
                color: white;
                text-shadow: .25em 0 0 rgba(255, 255, 255, 0), .5em 0 0 rgba(255, 255, 255, 0);
            }
            60% {
                text-shadow: .25em 0 0 white, .5em 0 0 rgba(255, 255, 255, 0);
            }
            80%, 100% {
                text-shadow: .25em 0 0 white, .5em 0 0 white;
            }
        }

        /* Progress Bar */
        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 30px auto;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: white;
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-top: 8px;
            font-weight: 300;
        }

        /* Subtitle */
        .loading-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: 15px;
            font-weight: 300;
        }

        /* Logo/Icon placeholder */
        .logo-area {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            position: relative;
        }

        .logo-area img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <!-- Lotus Tower Image with Pulse -->
        <div class="pulse-circle">
            <img src="../Resources/Icons/Silhouette/Lotus Tower.png" alt="Lotus Tower">
        </div>

        <div class="loading-text">
            Loading<span class="dots"></span>
        </div>

        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <div class="progress-text">
            <span id="progress-percent">0</span>% Loading
        </div>

        <div class="loading-subtitle">
            Preparing your experience
        </div>
    </div>

    <script>
        let progress = 0;
        let hasRedirected = false;
        const progressBar = document.querySelector('.progress');
        const progressText = document.getElementById('progress-percent');
    
        const urlParams = new URLSearchParams(window.location.search);
        const nextUrl = urlParams.get('next');
        const autoload = urlParams.get('autoload');
    
        // Animate progress bar slowly up to 90% while waiting
        const interval = setInterval(() => {
            const limit = autoload === 'true' ? 90 : 100;
            if (progress < limit) {
                progress += 5;
                progressBar.style.width = progress + '%';
                progressText.textContent = progress;
            }
            if (progress >= 100) {
                clearInterval(interval);
                redirectToNext();
            }
        }, 300);
    
        // If autoload, call /load API in background
        if (autoload === 'true') {
            fetch(`${window.location.origin}/api/documents/load`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => res.json())
            .then(() => {
                clearInterval(interval);
                progress = 100;
                progressBar.style.width = '100%';
                progressText.textContent = '100';
                redirectToNext();
            })
            .catch(() => {
                redirectToNext();
            });
        }
    
        function redirectToNext() {
            if (!hasRedirected) {
                hasRedirected = true;
                setTimeout(() => {
                    window.location.href = nextUrl 
                        ? decodeURIComponent(nextUrl) 
                        : 'LandingPG.html';
                }, 500);
            }
        }
    </script>
</body>
</html>
