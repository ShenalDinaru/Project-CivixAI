<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - Dashboard</title>
  <link rel="stylesheet" href="user_profile_styles.css">
</head>
<body>
  <!-- Navigation Bar (same template as User Settings) -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <button class="back-btn" type="button" aria-label="Back">
          <img src="/Resources/Icons/Back Icon.svg" alt="Back">
        </button>
      </div>
      <div class="nav-right">
        <button class="logout-btn" type="button">
          <img src="/Resources/Icons/Exit Icon.svg" alt="Logout">
          <span>Logout</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content (same layout as User Settings) -->
  <div class="main-content">
    <div class="content-wrapper">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-title">Account</h3>
          <ul class="sidebar-menu">
            <li class="menu-item active">
              <img src="/Resources/Icons/User Profile Icon.svg" alt="Profile" class="menu-icon">
              <span>Profile</span>
            </li>
            <li class="menu-item" id="userSettingsMenuItem" role="button" tabindex="0" aria-label="Open user settings">
              <span class="menu-link">
                <img src="/Resources/Icons/Settings Icon.svg" alt="Settings" class="menu-icon icon-white">
                <span>User Settings</span>
              </span>
            </li>
          </ul>
        </div>
      </aside>

      <!-- Main Panel -->
      <main class="settings-panel">
        <div class="panel-header">
          <h1 class="panel-title">User Profile</h1>
          <p class="panel-subtitle">View your account information</p>
        </div>

        <div class="settings-card profile-card">
          <!-- Profile picture with User Profile Icon -->
          <div class="profile-avatar-wrap">
            <div class="profile-avatar">
              <img src="/Resources/Icons/User Profile Icon.svg" alt="Profile" class="profile-pic-icon">
            </div>
            <h2 class="profile-name">Peter Davidson</h2>
          </div>

          <h3 class="card-title">Personal Information</h3>

          <div class="form-group">
            <label for="fullName">Full Name</label>
            <div class="input-wrapper">
              <input type="text" id="fullName" value="Peter Davidson" readonly>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="email" value="pd@gmail.com" readonly>
            </div>
          </div>

          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <div class="input-wrapper">
              <input type="tel" id="mobile" value="+941212313141" readonly>
            </div>
          </div>

          <button type="button" class="btn-primary settings-cta" id="openSettingsBtn">
            <img src="/Resources/Icons/Settings Icon.svg" alt="" class="icon-white">
            <span>User Settings</span>
          </button>
        </div>
      </main>
    </div>
  </div>

  <script src="user_profile_script.js"></script>
</body>
</html>
