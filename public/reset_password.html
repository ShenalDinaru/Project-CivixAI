<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Reset Password | CivixAI</title>
    <link rel="stylesheet" href="LandingPG_Styles.css" />
    <link rel="stylesheet" href="LoginPG_Styles.css" />
    <link rel="stylesheet" href="ResetPassword_Styles.css" />
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="../Resources/Background/sigiriya.jpg">
            <source src="../Resources/Background/SL Edited.mp4" type="video/mp4" />
        </video>

        <div class="overlay"></div>

        <div class="ui-card" id="resetPasswordCard" style="display: block;">
            <div class="back-nav" id="backBtn">
                <img src="../Resources/Icons/Back Button Icon.svg" alt="Back" class="back-icon">
            </div>

            <div class="brand-container login-logo">
                <img src="../Resources/Background/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <h2 class="form-title">Reset Password</h2>

            <div class="status-box" id="statusBox">
                <span id="statusText">Verifying reset link...</span>
            </div>

            <form id="resetPasswordForm" class="auth-form" style="display: none;">
                <div class="password-container">
                    <div class="input-group-wrapper">
                        <input type="password" id="newPassword" placeholder="New Password*" required>
                    </div>
                    <img src="../Resources/Icons/Password View Eye Icon.svg" class="toggle-password" data-target="newPassword">
                </div>

                <div class="password-container">
                    <div class="input-group-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm Password*" required>
                    </div>
                    <img src="../Resources/Icons/Password View Eye Icon.svg" class="toggle-password" data-target="confirmPassword">
                </div>

                <div class="strength-meter-wrapper">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>

                <div class="pass-req-box">
                    <p>Password must contain all of these:</p>
                    <ul>
                        <li id="len">8+ characters</li>
                        <li id="upper">1 uppercase letter</li>
                        <li id="lower">1 lowercase letter</li>
                        <li id="spec">1 number</li>
                    </ul>
                </div>

                <button type="submit" class="btn chat-btn" id="resetBtn" disabled style="opacity: 0.5; cursor: not-allowed;">
                    RESET PASSWORD
                </button>
            </form>

            <div class="auth-footer" style="margin-top: 20px;">
                <p><span class="reg-link" id="loginLink">Back to Login</span></p>
            </div>
        </div>

        <div class="ui-card" id="errorCard" style="display: none;">
            <div class="brand-container login-logo">
                <img src="../Resources/Background/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <h2 class="form-title">Reset Link Invalid</h2>

            <div class="status-box error" style="display: block;">
                <p id="errorText">The reset link is invalid or has expired.</p>
            </div>

            <button class="btn chat-btn" onclick="window.location.href='forgot-password.html'" 
                    style="margin-top: 20px;">
                Request New Link
            </button>

            <div class="auth-footer">
                <p><span class="reg-link" id="loginLink2">Back to Login</span></p>
            </div>
        </div>
    </div>

    <script src="ResetPassword_Script.js"></script>
</body>
</html>
