<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivixAI - Kandula</title>
    <link rel="stylesheet" href="Chatbot_styles.css">
</head>
<body>
    
    <div id="introOverlay" class="intro-overlay">
        
        <div id="loadingScreen" class="loading-container">
            <img src="../Resources/Chatbot icon - Elephant/elephant.png" alt="Loading..." class="loader-img">
            <div class="loader-text">Loading TaxKandula<span class="dots">...</span></div>
        </div>

        <img src="../Resources/Chatbot icon - Elephant/elephant.png" alt="Kandula" id="bigElephant" style="opacity: 0;">
    </div>

    <div class="background-slider">
        <div class="bg-slide active" style="background-image: url('../Resources/ChatbotBG/aerial-beach-and-coconut-trees-on-a-calm-island-in-2026-01-08-07-16-09-utc.jpg')"></div>
        <div class="bg-slide" style="background-image: url('../Resources/ChatbotBG/blue-train-in-sri-lanka-blue-sri-lankan-train-goe-2026-01-07-06-06-21-utc.jpg')"></div>
        <div class="bg-slide" style="background-image: url('../Resources/ChatbotBG/group-of-asian-elephants-at-tropical-river-sri-la-2026-01-05-04-48-13-utc.jpg')"></div>
        <div class="bg-slide" style="background-image: url('../Resources/ChatbotBG/panorama-of-the-tea-plantations-at-sunset-2026-01-11-10-58-09-utc.jpg')"></div>
        <div class="bg-slide" style="background-image: url('../Resources/ChatbotBG/pexels-thilina-alagiyawanna-3266092-32451027.jpg')"></div>
        <div class="overlay"></div> 
    </div>

    <div class="container ui-card" id="mainCard">
        
        <header class="chat-header">
            <div class="header-top">
                <button class="icon-btn" id="backBtn">
                    <img src="../Resources/Icons/Back Button Icon.svg" alt="Back" width="24">
                </button>
                
                <div class="logo-title">
                    <img src="../Resources/CivixAi Logo/CivixAI Logo (Dark Mode) - No BG.png" alt="CivixAI" class="header-logo">
                </div>

                <button class="icon-btn" id="menuBtn">
                    <div class="three-dots">•••</div>
                </button>
            </div>
            <div class="version-tag">Kandula - Personal AI Tax Assistant</div>
        </header>

        <div class="chat-container" id="chatContainer">
            </div>

        <div class="input-area">
            
            <div id="typingAvatarPopup" class="typing-avatar-popup">
                <img src="../Resources/Chatbot icon - Elephant/elephant.png" alt="Kandula">
            </div>

            <div class="input-box-wrapper">
                <textarea id="messageInput" placeholder="Ask Kandula about taxes..." rows="1"></textarea>
                <button id="sendButton" class="robot-send-btn">Send</button>
            </div>
            <p class="input-hint">Press Enter to send, Shift+Enter for new line</p>
        </div>
    </div>

    <div class="dropdown-menu" id="dropdownMenu">
        <a href="Home.html">Home</a>
        <a href="#" id="historyLink">Chat History</a>
        <a href="#" id="newChatLink">New Chat</a>
        <a href="UserProfile.html">User Profile</a>
    </div>

    <script src="Chatbot_script.js"></script>
</body>
</html>
