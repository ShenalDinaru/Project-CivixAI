<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivixAI | Vault</title>
  <link rel="stylesheet" href="vault_styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-left">
        <button class="back-btn" id="backBtn" type="button" aria-label="Back">
          <img src="/Resources/Icons/Back Icon.svg" alt="Back">
        </button>
      </div>
    </div>
  </nav>

  <div class="main-content">
    <div class="content-wrapper">
      <main class="settings-panel">
        <div class="panel-header">
          <h1 class="panel-title">Vault</h1>
          <p class="panel-subtitle">Store confidential information privately (encrypted at rest)</p>
        </div>

        <div class="settings-card">
          <h2 class="card-title">Add / Edit Entry</h2>

          <div class="form-grid">
            <div class="form-group">
              <label for="entryName">Entry Name</label>
              <input type="text" id="entryName" placeholder="e.g. Bank Login" maxlength="60">
            </div>

            <div class="form-group">
              <label for="nic">NIC</label>
              <input type="text" id="nic" placeholder="e.g. 123456789V" maxlength="30">
            </div>

            <div class="form-group">
              <label for="tin">TIN</label>
              <input type="text" id="tin" placeholder="Tax Identification Number" maxlength="40">
            </div>

            <div class="form-group">
              <label for="bankName">Bank Name</label>
              <input type="text" id="bankName" placeholder="e.g. People's Bank" maxlength="80">
            </div>

            <div class="form-group">
              <label for="bankAccountNumber">Bank Account Number</label>
              <input type="text" id="bankAccountNumber" placeholder="e.g. 1234567890" maxlength="60">
            </div>

            <div class="form-group">
              <label for="nicImage">NIC Image</label>
              <input type="file" id="nicImage" accept="image/*" capture="environment">
              <button type="button" class="btn-secondary small take-photo-btn" data-doc-target="nicImage">Take Photo</button>
              <small id="nicImageStatus">Upload an image or take a photo with camera.</small>
            </div>

            <div class="form-group">
              <label for="passportImage">Passport Image</label>
              <input type="file" id="passportImage" accept="image/*" capture="environment">
              <button type="button" class="btn-secondary small take-photo-btn" data-doc-target="passportImage">Take Photo</button>
              <small id="passportImageStatus">Upload an image or take a photo with camera.</small>
            </div>

            <div class="form-group">
              <label for="drivingLicenseImage">Driving License Image</label>
              <input type="file" id="drivingLicenseImage" accept="image/*" capture="environment">
              <button type="button" class="btn-secondary small take-photo-btn" data-doc-target="drivingLicenseImage">Take Photo</button>
              <small id="drivingLicenseImageStatus">Upload an image or take a photo with camera.</small>
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
              <label for="notes">Notes (optional)</label>
              <textarea id="notes" rows="4" placeholder="Any extra context..."></textarea>
            </div>
          </div>

          <input type="hidden" id="editingEntryId" value="">

          <div class="form-actions">
            <button type="button" class="btn-primary" id="saveEntryBtn">
              Save Entry
            </button>
            <button type="button" class="btn-secondary" id="clearFormBtn">
              Clear
            </button>
          </div>
        </div>

        <div class="settings-card">
          <div class="list-header">
            <h2 class="card-title">Saved Entries</h2>
            <button type="button" class="btn-secondary small" id="refreshEntriesBtn">Refresh</button>
          </div>
          <div id="entriesList" class="entries-list">
            <div class="empty-state" id="entriesEmptyState">
              No vault entries yet.
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="camera-modal" id="cameraModal" aria-hidden="true">
    <div class="camera-modal-card">
      <div class="camera-modal-header">
        <h3 id="cameraModalTitle">Take Photo</h3>
      </div>
      <video id="cameraPreview" autoplay playsinline muted></video>
      <canvas id="cameraCanvas" style="display: none;"></canvas>
      <div class="camera-modal-actions">
        <button type="button" class="btn-secondary" id="cameraCancelBtn">Cancel</button>
        <button type="button" class="btn-primary" id="cameraCaptureBtn">Capture</button>
      </div>
    </div>
  </div>

  <div class="image-viewer-modal" id="imageViewerModal" aria-hidden="true">
    <div class="image-viewer-card">
      <div class="image-viewer-header">
        <h3 id="imageViewerTitle">Document Image</h3>
      </div>
      <img id="imageViewerPreview" alt="Vault document preview">
      <div class="image-viewer-actions">
        <button type="button" class="btn-secondary" id="imageViewerCloseBtn">Close</button>
        <button type="button" class="btn-primary" id="imageViewerEditBtn">Edit Entry</button>
      </div>
    </div>
  </div>

  <script src="vault_script.js"></script>
</body>
</html>
