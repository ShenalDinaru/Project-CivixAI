<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivixAI | Login</title>
    <link rel="stylesheet" href="LandingPG_Styles.css" />
    <link rel="stylesheet" href="LoginPG_Styles.css" />
    
    <!-- Favicons for dark and light mode -->
    <link rel="icon" type="image/png" href="/Resources/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/Resources/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/Resources/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Resources/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CivixAI" />
    <link rel="manifest" href="/Resources/favicons/site.webmanifest" />
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="../Resources/Background/sigiriya.jpg">
            <source src="../Resources/Background/SL Edited.mp4" type="video/mp4" />
        </video>

        <div class="overlay"></div>

        <div class="ui-card">
            <div class="back-nav" id="backBtn">
                <img src="../Resources/Icons/Back Button Icon.svg" alt="Back" class="back-icon">
            </div>

            <div class="brand-container login-logo">
                <img src="../Resources/Background/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group-wrapper">
                    <input type="email" placeholder="Email address" required>
                </div>
                
                <div class="input-group-wrapper password-container">
                    <input type="password" id="passwordField" placeholder="Password" required>
                    <span class="toggle-password" data-target="passwordField">👁️</span>
                </div>

                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot_password.html" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn chat-btn" id="askNowBtn">LOGIN</button>
            </form>

            <div class="auth-footer">
                <p>Not a Civica? <span class="reg-link" id="registerLink">Register Now</span></p>
            </div>
        </div>
    </div>

    <script src="LoginPG_Script.js"></script>
</body>
</html>
