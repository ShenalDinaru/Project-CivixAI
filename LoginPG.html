<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CivixAI | Login</title>
    <link rel="stylesheet" href="landingpg_styles.css" />
    <link rel="stylesheet" href="LoginPG_Styles.css" />
</head>
<body>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline poster="Resources/sigiriya.jpg">
            <source src="" type="video/mp4" />
        </video>

        <div class="overlay"></div>

        <div class="ui-card">
            <div class="back-nav" id="backBtn">
                <img src="Resources/Back Button Icon.svg" alt="Back" class="back-icon">
            </div>

            <div class="brand-container login-logo">
                <img src="Resources/welcome1.png" alt="CivixAI Logo" class="brand-img">
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group-wrapper">
                    <input type="email" placeholder="Email address" required>
                </div>
                
                <div class="input-group-wrapper password-container">
                    <input type="password" id="passwordField" placeholder="Password" required>
                    <img src="Resources/eye-icon.png" class="toggle-password" id="togglePassword" alt="Toggle View">
                </div>

                <div class="form-row">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="password_reset.html" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn chat-btn" id="askNowBtn">LOGIN</button>
            </form>

            <div class="auth-footer">
                <p>Not a Civica? <span class="reg-link" id="registerLink">Register Now</span></p>
            </div>
        </div>
    </div>

    <script src="LoginPG_Script.js"></script>
</body>
</html>
