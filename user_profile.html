<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="user_profile_styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <button class="back-btn" type="button">
        <img src="Resources/Icons/Back Icon.svg" alt="Back">
      </button>
      <button class="logout-btn" type="button">
        <img src="Resources/Icons/Exit Icon.svg" alt="Logout">
        <span>Logout</span>
      </button>
    </header>

    <!-- Main content: profile + details side by side (landscape) -->
    <main class="main-content">
      <!-- Profile Section -->
      <section class="profile-section">
        <div class="avatar">
          <span class="avatar-initial">P</span>
        </div>
        <h1 class="profile-title">User</h1>
      </section>

      <!-- User Details -->
      <section class="details-section">
        <h2 class="section-title">User Details</h2>
        
        <div class="detail-item">
          <label class="detail-label">Full Name</label>
          <p class="detail-value">Peter Davidson</p>
        </div>

        <div class="detail-item">
          <label class="detail-label">Email Address</label>
          <p class="detail-value">pd@gmail.com</p>
        </div>

        <div class="detail-item">
          <label class="detail-label">Mobile Number</label>
          <p class="detail-value">+941212313141</p>
        </div>

        <button class="settings-btn" type="button">
          <img src="Resources/Icons/Settings Icon.svg" alt="Settings">
          <span>User Settings</span>
        </button>
      </section>
    </main>
  </div>

  <script src="user_profile_script.js"></script>
</body>
</html>
