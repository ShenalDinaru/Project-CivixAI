<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivixAI - Kandula</title>
    <link rel="stylesheet" href="ChatbotScanner_styles.css">
</head>
<body>
    
    <div id="introOverlay" class="intro-overlay">
        
        <div id="loadingScreen" class="loading-container">
            <img src="Resources/Chatbot icon - Elephant/elephant.png" alt="Loading..." class="loader-img">
            <div class="loader-text">Loading Kandula<span class="dots">...</span></div>
        </div>

        <img src="Resources/Chatbot icon - Elephant/elephant.png" alt="Kandula" id="bigElephant" style="opacity: 0;">
    </div>

    <div class="background-slider">
        <div class="bg-slide active" style="background-image: url('Resources/Background/1.jpg')"></div>
        <div class="bg-slide" style="background-image: url('Resources/Background/2.jpg')"></div>
        <div class="bg-slide" style="background-image: url('Resources/Background/3.jpg')"></div>
        <div class="bg-slide" style="background-image: url('Resources/Background/4.jpg')"></div>
        <div class="bg-slide" style="background-image: url('Resources/Background/5.jpg')"></div>
        <div class="overlay"></div> 
    </div>

    <div class="container ui-card" id="mainCard">
        
        <header class="chat-header">
            <div class="header-top">
                <button class="icon-btn" id="backBtn">
                    <img src="Resources/Icons/Back Button Icon.svg" alt="Back" width="24">
                </button>
                
                <div class="logo-title">
                    <img src="Resources/CivixAi Logo/CivixAI Logo (Dark Mode) - No BG.png" alt="CivixAI" class="header-logo">
                </div>

                <button class="icon-btn" id="menuBtn">
                    <div class="three-dots">•••</div>
                </button>
            </div>
            <div class="version-tag">Kandula - Personal AI Tax Assistant</div>
        </header>

        <!-- Tab Bar -->
        <div class="tab-bar" id="tabBar">
            <div class="tabs-container" id="tabsContainer">
                <!-- Tabs will be dynamically added here -->
            </div>
            <button class="add-tab-btn" id="addTabBtn" title="New Chat Tab">+</button>
        </div>

        <div class="chat-container" id="chatContainer">
            </div>

        <div class="input-area">
            
            <div id="typingAvatarPopup" class="typing-avatar-popup">
                <img src="Resources/Chatbot icon - Elephant/elephant.png" alt="Kandula">
            </div>

            <div class="input-box-wrapper">
                <textarea id="messageInput" placeholder="Ask Kandula about taxes..." rows="1"></textarea>
                <button id="sendButton" class="robot-send-btn">Send</button>
            </div>
            <p class="input-hint">Press Enter to send, Shift+Enter for new line</p>
        </div>
    </div>

    <div class="dropdown-menu" id="dropdownMenu">
        <a href="/home.html" id="homeLink">Home</a>
        <a href="#" id="historyLink">Chat History</a>
        <a href="#" id="newChatLink">New Chat</a>
        <a href="/user_profile.html" id="userProfileLink">User Profile</a>
    </div>

    <!-- Chat History Modal -->
    <div class="history-modal" id="historyModal">
        <div class="history-modal-content">
            <div class="history-header">
                <h2>Chat History</h2>
                <button class="close-btn" id="closeHistoryBtn">&times;</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">No conversations yet</div>
            </div>
            <div class="history-footer">
                <button id="clearHistoryBtn" class="clear-btn">Clear All History</button>
            </div>
        </div>
    </div>

    <script src="ChatbotScanner_script.js"></script>
</body>
</html>
