<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivixAI - Kandula</title>
    <link rel="stylesheet" href="ChatbotScanner_styles.css">
    <!-- Favicons for dark and light mode -->
    <link rel="icon" type="image/png" href="/Resources/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/Resources/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/Resources/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Resources/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="CivixAI" />
    <link rel="manifest" href="/Resources/favicons/site.webmanifest" />
</head>
<body>
    
    <div id="introOverlay" class="intro-overlay">
        
        <div id="loadingScreen" class="loading-container">
            <img src="/Resources/Chatbot icon - Elephant/elephant.png" alt="Loading..." class="loader-img">
            <div class="loader-text">Loading Kandula<span class="dots">...</span></div>
        </div>

        <img src="/Resources/Chatbot icon - Elephant/elephant.png" alt="Kandula" id="bigElephant" style="opacity: 0;">
    </div>

    <div class="background-slider">
        <div class="bg-slide active" style="background-image: url('/Resources/Background/Chat%20Bot%20BG%20Image.png')"></div>
        <div class="bg-slide" style="background-image: url('/Resources/Background/sigiriya.jpg')"></div>
        <div class="bg-slide" style="background-image: url('/Resources/Background/temple.jpg')"></div>
        <div class="bg-slide" style="background-image: url('/Resources/Background/downsouth.jpg')"></div>
        <div class="bg-slide" style="background-image: url('/Resources/Background/Document%20Scanner%20BG%20image.jpg')"></div>
        <div class="overlay"></div> 
    </div>

    <div class="main-layout" id="mainLayout">
        <!-- Left Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="Resources/CivixAi Logo/CivixAI Logo (Dark Mode) - No BG (Home).png" alt="CivixAI" class="sidebar-logo">
            </div>

            <button class="new-conversation-btn" id="newConversationBtn">
                <span class="plus-icon">+</span>
                New Conversation
            </button>

            <div class="conversations-section">
                <h3 class="section-title">Today</h3>
                <div class="conversations-list" id="conversationsList">
                    <!-- Conversations will be dynamically added here -->
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="container ui-card" id="mainCard">
            
            <header class="chat-header">
                <div class="header-top">
                    <button class="icon-btn" id="backBtn">
                        <img src="Resources/Icons/Back Button Icon.svg" alt="Back" width="24">
                    </button>
                    
                    <div class="logo-title">
                        <span class="current-chat-title" id="currentChatTitle">New Chat</span>
                    </div>

                    <button class="icon-btn" id="menuBtn">
                        <div class="three-dots">•••</div>
                    </button>
                </div>
                <div class="version-tag">Kandula - Personal AI Civic Assistant</div>
            </header>

            <div class="chat-container" id="chatContainer">
            </div>

            <div class="input-area">
                
                <div id="typingAvatarPopup" class="typing-avatar-popup">
                    <img src="/Resources/Chatbot icon - Elephant/elephant.png" alt="Kandula">
                </div>

                <div class="input-box-wrapper">
                    <textarea id="messageInput" placeholder="Ask Kandula about taxes..." rows="1"></textarea>
                    <button id="sendButton" class="robot-send-btn">Send</button>
                </div>
                <p class="input-hint">Press Enter to send, Shift+Enter for new line</p>
            </div>
        </div>
    </div>

    <div class="dropdown-menu" id="dropdownMenu">
        <a href="/home.html" id="homeLink">Home</a>
        <a href="#" id="deleteConversationLink">Delete Conversation</a>
        <a href="#" id="clearAllLink">Clear All Conversations</a>
        <a href="/user_profile.html" id="userProfileLink">User Profile</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="ChatbotScanner_script.js"></script>
</body>
</html>
